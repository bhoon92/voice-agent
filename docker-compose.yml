services:
  postgres:
    image: postgres:16-alpine
    container_name: voice-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: voice
      POSTGRES_PASSWORD: voice
      POSTGRES_DB: voice_agent
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U voice -d voice_agent']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: voice-agent-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # LiveKit media server (SFU + signaling). --dev mode uses the well-known
  # API key/secret pair devkey/secret, which is fine for local development.
  livekit:
    image: livekit/livekit-server:latest
    container_name: voice-agent-livekit
    restart: unless-stopped
    command: --dev --bind 0.0.0.0
    ports:
      - '7880:7880'       # WebSocket / HTTP (signaling + API)
      - '7881:7881'       # TCP fallback for WebRTC
      - '7882:7882/udp'   # UDP for WebRTC media

volumes:
  pgdata:
